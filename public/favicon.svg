<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#1a1b23" rx="8"/>
  <!-- Kanban board pixel art -->
  <rect x="4" y="4" width="56" height="56" fill="#22232e" rx="4"/>
  <!-- Header bar -->
  <rect x="4" y="4" width="56" height="8" fill="#6c63ff" rx="2"/>
  <text x="32" y="10" font-family="monospace" font-size="6" fill="#fff" text-anchor="middle" font-weight="bold">TRIBU</text>

  <!-- Column 1 - TODO (red) -->
  <rect x="8" y="16" width="14" height="40" fill="#2a2b38" rx="2"/>
  <rect x="8" y="16" width="14" height="4" fill="#ff6b6b" rx="1"/>
  <rect x="10" y="22" width="10" height="3" fill="#3a3b48" rx="1"/>
  <rect x="10" y="27" width="10" height="3" fill="#3a3b48" rx="1"/>
  <rect x="10" y="32" width="10" height="3" fill="#3a3b48" rx="1"/>

  <!-- Column 2 - WIP (yellow) -->
  <rect x="25" y="16" width="14" height="40" fill="#2a2b38" rx="2"/>
  <rect x="25" y="16" width="14" height="4" fill="#ffd93d" rx="1"/>
  <rect x="27" y="22" width="10" height="3" fill="#3a3b48" rx="1"/>
  <rect x="27" y="27" width="10" height="3" fill="#3a3b48" rx="1"/>

  <!-- Column 3 - DONE (green) -->
  <rect x="42" y="16" width="14" height="40" fill="#2a2b38" rx="2"/>
  <rect x="42" y="16" width="14" height="4" fill="#6bcb77" rx="1"/>
  <rect x="44" y="22" width="10" height="3" fill="#3a3b48" rx="1"/>

  <!-- Agent avatars (pixel faces) -->
  <!-- Zeref - wizard -->
  <rect x="11" y="42" width="4" height="4" fill="#2a2b38" rx="1"/>
  <rect x="12" y="43" width="2" height="2" fill="#6c63ff"/>

  <!-- PixelBot - robot -->
  <rect x="28" y="36" width="4" height="4" fill="#2a2b38" rx="1"/>
  <rect x="29" y="37" width="2" height="2" fill="#8b83ff"/>

  <!-- Nyx - fox -->
  <rect x="45" y="30" width="4" height="4" fill="#2a2b38" rx="1"/>
